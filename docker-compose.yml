services:
  vibe:
    build: .
    volumes:
      - ./:/app                                # 脚手架代码
      - ${TARGET_PROJECT:-.}:/workspace        # 目标项目（默认当前目录）
      - ./tasks:/workspace/tasks               # 任务队列
      - gradle-cache:/home/user/.gradle        # Gradle 下载/构建缓存
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VIBE_MAX_WORKERS=${VIBE_MAX_WORKERS:-1}
      - ANDROID_HOME=/opt/android-sdk
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    ports:
      - "${VIBE_PORT:-8080}:8080"
    command: uv run python -m vibe run
    working_dir: /workspace

  test:
    build: .
    volumes:
      - ./:/app:ro
      - test_workspace:/workspace
      - test_tasks:/workspace/tasks
      - gradle-cache:/home/user/.gradle        # 共享 Gradle 缓存
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANDROID_HOME=/opt/android-sdk
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    working_dir: /workspace
    entrypoint: ["bash"]

volumes:
  test_workspace:
  test_tasks:
  gradle-cache:                                # 跨容器持久化 Gradle 缓存
